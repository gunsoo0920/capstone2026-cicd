name: CI Pipeline

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  # ── Job 1: 백엔드 빌드 & 테스트 ──
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4

      - name: Java 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven' # 빌드 속도 향상을 위한 캐싱 추가

      # Git에서 권한 설정을 마쳤다면 아래 'chmod' 단계는 삭제해도 됩니다.
      # 만약 설정 전이라면 유지하세요.
      - name: mvnw 실행 권한 확인 (필요시)
        run: chmod +x backend/mvnw

      - name: Maven 빌드 & 테스트
        run: |
          cd backend
          ./mvnw clean package -DskipTests

  # ── Job 2: 프론트엔드 빌드 ──
  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 24 설정
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm' # 의존성 설치 속도 향상

      - name: 의존성 설치 & 빌드
        run: |
          cd frontend
          npm install
          npm run build