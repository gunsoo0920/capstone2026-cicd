name: CI Pipeline

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  # ── Job 1: 백엔드 빌드 & 테스트 ──
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4

      - name: Java 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      # 중요: ./mvnw 실행 권한을 먼저 부여해야 합니다.
      - name: mvnw 실행 권한 부여
        run: chmod +x backend/mvnw

      - name: Maven 빌드 & 테스트
        run: |
          cd backend
          ./mvnw clean package -DskipTests

  # ── Job 2: 프론트엔드 빌드 ──
  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 18 설정
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 의존성 설치 & 빌드
        run: |
          cd frontend
          npm install
          npm run build